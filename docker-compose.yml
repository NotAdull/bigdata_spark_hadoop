version: "3.8"

services:
  # ============================================================
  # PostgreSQL AdventureWorks
  # ============================================================
  postgres:
    image: chriseaton/adventureworks:postgres
    container_name: adventureworks-postgres
    environment:
      POSTGRES_PASSWORD: My_password1
    ports:
      - "5433:5432"
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Hadoop NameNode
  # ============================================================
  namenode:
    image: apache/hadoop:3.3.6
    container_name: hadoop-namenode
    hostname: namenode
    user: root
    command: >
      bash -c "
        mkdir -p /tmp/hadoop-hadoop/dfs/name &&
        chown -R hadoop:hadoop /tmp/hadoop-hadoop &&
        su -s /bin/bash hadoop -c 'hdfs namenode -format -force -nonInteractive' 2>/dev/null || true &&
        su -s /bin/bash hadoop -c 'hdfs namenode'
      "
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-hadoop/dfs/name"
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - namenode_data:/tmp/hadoop-hadoop/dfs/name
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # Hadoop DataNode
  # ============================================================
  datanode:
    image: apache/hadoop:3.3.6
    container_name: hadoop-datanode
    hostname: datanode
    user: root
    command: >
      bash -c "
        mkdir -p /tmp/hadoop-hadoop/dfs/data &&
        chown -R hadoop:hadoop /tmp/hadoop-hadoop &&
        su -s /bin/bash hadoop -c 'hdfs datanode'
      "
    env_file:
      - ./hadoop.env
    ports:
      - "9864:9864"
    volumes:
      - datanode_data:/tmp/hadoop-hadoop/dfs/data
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net

  # ============================================================
  # YARN ResourceManager
  # ============================================================
  resourcemanager:
    image: apache/hadoop:3.3.6
    container_name: hadoop-resourcemanager
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    env_file:
      - ./hadoop.env
    ports:
      - "8088:8088"
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net

  # ============================================================
  # YARN NodeManager
  # ============================================================
  nodemanager:
    image: apache/hadoop:3.3.6
    container_name: hadoop-nodemanager
    hostname: nodemanager
    command: ["yarn", "nodemanager"]
    env_file:
      - ./hadoop.env
    depends_on:
      - resourcemanager
    networks:
      - bigdata-net

  # ============================================================
  # Apache Hive Metastore
  # ============================================================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    hostname: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=postgres
        -Djavax.jdo.option.ConnectionPassword=My_password1
    ports:
      - "9083:9083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bigdata-net
    volumes:
      - ./jars/postgresql-42.7.3.jar:/opt/hive/lib/postgresql-42.7.3.jar
      - ./hive-conf:/hive-custom-conf

  # ============================================================
  # HiveServer2
  # ============================================================
  hiveserver2:
    image: apache/hive:3.1.3
    container_name: hiveserver2
    hostname: hiveserver2
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      HIVE_CUSTOM_CONF_DIR: /hive-custom-conf
      SERVICE_OPTS: >-
        -Dhive.metastore.uris=thrift://hive-metastore:9083
    ports:
      - "10000:10000"
      - "10002:10002"
    depends_on:
      - hive-metastore
    networks:
      - bigdata-net
    volumes:
      - ./hive-conf:/hive-custom-conf

  # ============================================================
  # Apache Spark + Jupyter Notebook
  # ============================================================
  spark-jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: spark-jupyter
    hostname: spark-jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "bigdata2024"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./jars:/home/jovyan/work/jars
    networks:
      - bigdata-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      namenode:
        condition: service_healthy
      hiveserver2:
        condition: service_started

networks:
  bigdata-net:
    driver: bridge

volumes:
  namenode_data:
  datanode_data: